<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 260px; margin: 0; padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px; color: #1f2937; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle; }
    .g { background: #16a34a; } .a { background: #d97706; } .r { background: #dc2626; }
    p { margin: 6px 0; line-height: 1.4; }
    .muted { color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Pearl Dupe Checker</h1>
  <p>Open any HubSpot contact. A badge appears bottom-right:</p>
  <p><span class="dot g"></span>No duplicates</p>
  <p><span class="dot a"></span>Possible match — click to expand</p>
  <p><span class="dot r"></span>Likely duplicate — click to expand</p>
  <p class="muted">Uses your own HubSpot login. Nothing leaves your browser.
     Make sure you're signed in to HubSpot.</p>
</body>
</html>
