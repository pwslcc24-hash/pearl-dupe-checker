<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Blue rounded square background -->
  <rect width="128" height="128" rx="22" fill="#1d4ed8"/>

  <!-- Back document (white, slightly offset up-right — the "duplicate") -->
  <rect x="44" y="20" width="50" height="62" rx="7" fill="white" fill-opacity="0.45"/>

  <!-- Front document (white, solid) -->
  <rect x="28" y="34" width="50" height="62" rx="7" fill="white"/>

  <!-- Document lines on front card -->
  <rect x="38" y="50" width="30" height="4" rx="2" fill="#1d4ed8" fill-opacity="0.5"/>
  <rect x="38" y="60" width="23" height="4" rx="2" fill="#1d4ed8" fill-opacity="0.5"/>
  <rect x="38" y="70" width="26" height="4" rx="2" fill="#1d4ed8" fill-opacity="0.5"/>

  <!-- Red warning badge bottom-right -->
  <circle cx="92" cy="92" r="20" fill="#dc2626"/>
  <!-- Exclamation mark in badge -->
  <rect x="89" y="81" width="6" height="12" rx="3" fill="white"/>
  <circle cx="92" cy="99" r="3.5" fill="white"/>
</svg>
